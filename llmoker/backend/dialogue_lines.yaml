  - "비겼다고 좋아하진 마."
  - "오늘은 여기까지야. 다음 판에서 끝내지."
  - "비기는 건 지는 거랑 같아, 나한테는."
  - "운이 나를 피해갔네. 잠깐이지만."
  - "아깝네. 다음엔 제대로 끝내줄게."
  - "이런 결과, 마음에 안 들어."

match_end_win:
  - "처음부터 결과는 정해져 있었어."
  - "다음에 또 와. 결과는 같겠지만."
  - "잘 싸웠어. 하지만 나한테는 아니야."
