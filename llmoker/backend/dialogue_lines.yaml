  - "다음 판도 똑같이 될 거야."
  - "이 정도는 예상했어."
  - "아직도 이길 생각이야?"
  - "수고했어. 잘 졌어."
  - "역시 그렇지."
  - "애쓰지 마. 처음부터 결과는 정해져 있었어."

