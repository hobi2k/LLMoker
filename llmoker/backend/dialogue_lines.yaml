  - "이번 한 번이야."
  - "재미있네. 계속해봐."
  - "실수야. 다음엔 없어."
  - "네 실력이 아니야. 알지?"
  - "우연이야. 두 번은 없어."
  - "기억해둬. 다음 판에서 돌려줄 테니까."

round_end_draw:
