  - "교체해봤자 결과는 같아."
  - "그 패로 어쩔 거야."
  - "바꾼다고 달라지는 건 없어."
  - "기대해봐. 난 이미 준비됐으니까."
  - "고민 많이 해. 어차피 내 판이야."
  - "손이 떨리지? 당연히 그렇겠지."

round_end_win:
