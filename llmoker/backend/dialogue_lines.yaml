# 사야 대사 풀 — 상황별 7줄
# dialogue_key → lines 목록
# LLM은 index(0~6)만 선택한다.

match_intro:
  - "오늘은 내가 끝장낼 거야."
  - "실력 차이가 나도 불만은 없겠지?"
  - "시작부터 긴장한 거야? 재밌네."
  - "이미 결과는 정해져 있어."
  - "이런 판에서 지면 창피한 줄 알아야 해."
  - "부담 갖지 마. 어차피 내가 이기니까."
  - "잘 봐둬. 오늘 제대로 배우는 날이야."

round_start:
  - "또 시작이야. 버틸 자신 있어?"
  - "이번 판도 내 페이스야."
  - "집중하는 척하지 마. 다 보여."
  - "얼마나 버틸지 두고 보자."
  - "서두르지 마. 어차피 내가 이길 거야."
  - "새 판이야. 달라지는 건 없겠지만."
  - "기운 차려. 쉽게 끝내면 재미없잖아."

betting_check:
  - "체크? 겁난 거야, 아니면 함정이야?"
  - "그 체크, 믿어도 되는 건지 모르겠네."
  - "눈치 보는 거 표 나."
  - "체크로 숨을 수 있다고 생각해?"
  - "잠깐 숨 고르는 거야? 소용없어."
  - "조심스러운 거야? 잘 됐네."
  - "그 선택, 후회하게 될 거야."

betting_bet:
  - "베팅? 그 손패로?"
  - "겁도 없네. 좋아."
  - "돈만 날리는 거야."
  - "그 베팅이 맞는 판단인지 두고 봐."
  - "오, 오늘 공격적이네. 재밌어."
  - "돈으로 덮으려는 거야?"
  - "그 베팅, 받아줄게."

betting_call:
  - "콜이야? 용감하네."
  - "포기 못하는 거야, 아니면 뭔가 있는 거야?"
  - "따라오는 건 자유야. 결과는 내가 정하지만."
  - "좋아. 끝까지 가보자."
  - "콜로 버티는 거야? 얼마나 가나 보자."
  - "멈추지 않네. 의외야."
  - "배짱은 인정해. 패는 모르겠지만."

betting_raise:
  - "레이즈? 이제 막 달아오르는 거야?"
  - "올려봤자 내가 더 올릴 수 있어."
  - "그 기세, 유지할 수 있어?"
  - "도전이야? 받아줄게."
  - "레이즈로 겁주려는 거야? 안 먹혀."
  - "흥미롭네. 계속해봐."
  - "그래, 좀 살아있어야 재밌지."

betting_neutral:
  - "방금 그 선택, 나쁘지 않네."
  - "흠. 생각보다 할 줄 아네."
  - "그 행동, 계산된 거야?"
  - "다음이 기대되네."
  - "잘 보고 있어."
  - "아직은 봐줄게."
  - "예상 밖이야. 조금이지만."

draw:
